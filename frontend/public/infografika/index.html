<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullstack CRUD Dokumentációs Portál</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden">

    <!-- Felső sáv -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
            </div>
            <h1 class="font-extrabold text-slate-800 tracking-tight text-lg hidden sm:block uppercase">
                Fullstack <span class="text-indigo-600 italic text-xl">CRUD</span> <span class="font-light text-slate-400">Docs</span>
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs font-medium text-slate-400 uppercase tracking-widest bg-slate-100 px-3 py-1 rounded-full border border-slate-200">Verzió 1.0</span>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Oldalsáv navigáció -->
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 sidebar-scroll overflow-y-auto">
            <nav class="p-4 space-y-8">
                
                <!-- Szekció: Alapok -->
                <div>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 px-3">Projekt Alapok</h3>
                    <div class="space-y-1">
                        <button onclick="loadPage('ProjektIndex_i.html', this)" class="nav-link active w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="map" class="w-4 h-4"></i> Tanulási Útiterv
                        </button>
                        <button onclick="loadPage('Fullstack_CRUD_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="layers" class="w-4 h-4"></i> Fullstack & CRUD
                        </button>
                        <button onclick="loadPage('MVCMinta_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="cpu" class="w-4 h-4"></i> MVC Architektúra
                        </button>
                        <button onclick="loadPage('TisztaKod.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="sparkles" class="w-4 h-4"></i> Tiszta Kód (Clean Code)
                        </button>
                    </div>
                </div>

                <!-- Szekció: Komponensek -->
                <div>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 px-3">Frontend Komponensek</h3>
                    <div class="space-y-1">
                        <button onclick="loadPage('App_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="home" class="w-4 h-4"></i> App.jsx (Központ)
                        </button>
                        <button onclick="loadPage('UserForm_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="file-text" class="w-4 h-4"></i> UserForm.jsx
                        </button>
                        <button onclick="loadPage('UserTable_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="table" class="w-4 h-4"></i> UserTable.jsx
                        </button>
                        <button onclick="loadPage('UserTableRow_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="zap" class="w-4 h-4"></i> UserTableRow.jsx
                        </button>
                    </div>
                </div>

                <!-- Szekció: Tesztelés -->
                <div>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 px-3">Tesztelés</h3>
                    <div class="space-y-1">
                        <button onclick="loadPage('TesztelesAltalanos_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="beaker" class="w-4 h-4"></i> Általános Tesztelés
                        </button>
                        <button onclick="loadPage('UnitTEszt_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="zap" class="w-4 h-4"></i> Unit Tesztelés
                        </button>
                        <button onclick="loadPage('IntegraciosTeszt_i.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="link" class="w-4 h-4"></i> Integrációs Teszt
                        </button>
                        <button onclick="loadPage('test-runner.html', this)" class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-slate-100 text-slate-600">
                            <i data-lucide="play-circle" class="w-4 h-4"></i> Webes Teszt Futtató
                        </button>
                    </div>
                </div>

            </nav>
            
            <!-- Alsó info blokk és Kapcsolat -->
            <div class="mt-auto p-6 border-t border-slate-100 space-y-4">
                
                <!-- Kapcsolat -->
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <p class="text-[10px] text-slate-500 font-bold mb-2 uppercase tracking-widest">Kapcsolat</p>
                    <ul class="text-xs text-slate-600 space-y-2">
                        <li class="flex items-center gap-2">
                            <i data-lucide="mail" class="w-3 h-3 text-slate-400"></i> 
                            <a href="mailto:info@pelda.hu" class="hover:text-indigo-600 transition-colors">info@pelda.hu</a>
                        </li>
                        <li class="flex items-center gap-2">
                            <i data-lucide="phone" class="w-3 h-3 text-slate-400"></i> 
                            <a href="tel:+36301234567" class="hover:text-indigo-600 transition-colors">+36 30 123 4567</a>
                        </li>
                        <li class="flex items-center gap-2">
                            <i data-lucide="globe" class="w-3 h-3 text-slate-400"></i> 
                            <a href="https://www.pelda.hu" target="_blank" class="hover:text-indigo-600 transition-colors">www.pelda.hu</a>
                        </li>
                    </ul>
                </div>

                <!-- Súgó -->
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                    <p class="text-[10px] text-indigo-700 font-bold mb-1 italic">Súgó</p>
                    <p class="text-[11px] text-indigo-900 leading-relaxed">
                        Válaszd ki a dokumentumot a bal oldali menüből a megjelenítéshez.
                    </p>
                </div>
            </div>
        </aside>

        <!-- Tartalmi terület (iframe) -->
        <main class="flex-1 bg-slate-100 relative">
            <div id="loading-overlay" class="absolute inset-0 bg-slate-100 flex items-center justify-center z-10 hidden">
                <div class="flex flex-col items-center gap-3">
                    <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Betöltés...</span>
                </div>
            </div>
            <iframe id="content-frame" name="content-frame" src="ProjektIndex_i.html"></iframe>
        </main>
    </div>

    <script>
        // Lucide ikonok inicializálása
        lucide.createIcons();

        function loadPage(url, element) {
            const frame = document.getElementById('content-frame');
            const overlay = document.getElementById('loading-overlay');
            
            // Aktív stílus kezelése
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            element.classList.add('active');

            // Overlay mutatása betöltésig
            overlay.classList.remove('hidden');
            
            // Iframe forrásának beállítása
            frame.src = url;

            frame.onload = () => {
                overlay.classList.add('hidden');
            };
        }
    </script>
</body>
</html>
